# GitHub Actions release pipeline.
#
# Trigger: push of a tag matching v*.*.* (e.g. v0.1.0). Steps:
#   1. Build a universal-binary, Developer-ID-signed, hardened-runtime
#      AVPainReliever.app via the right build script for the tag:
#        - v0.0.0-* / v0.1.* → scripts/make-app.sh (no virtual camera)
#        - v0.2.* and later  → scripts/make-app-with-virtual-camera.sh
#          (includes embedded CMIO Camera Extension)
#   2. Notarize via notarytool (--wait), then staple the ticket.
#   3. EdDSA-sign the .app.zip with Sparkle's sign_update.
#   4. Create a draft GitHub Release with auto-generated notes and the
#      .app.zip attached.
#   5. Append a new <item> to appcast.xml on main and push, so existing
#      installs see the update.
#
# Required GitHub Secrets — see docs/releasing.md for setup instructions:
#   MACOS_CERTIFICATE             base64 of the Developer ID Application .p12
#   MACOS_CERTIFICATE_PASSWORD    .p12 password
#   MACOS_KEYCHAIN_PASSWORD       random — for the temp keychain Actions creates
#   MACOS_PROVISIONING_PROFILE    base64 of AVPainReliever.provisionprofile
#                                 (only needed for v0.2.x+ — the system
#                                 extension activation requires it; v0.1.x
#                                 builds never see this step)
#   APPLE_ID                      developer Apple ID email
#   APPLE_ID_PASSWORD             app-specific password for notarytool
#   APPLE_TEAM_ID                 10-char Team ID
#   SPARKLE_PRIVATE_KEY           EdDSA private key from generate_keys -x (raw, base64-decoded contents)
#
# Each step that depends on a secret early-exits with a warning when
# the secret is empty. That makes a v0.0.0-dryrun tag possible without
# Apple credentials: the build runs, the bundle is unsigned, the
# notarize/sign/appcast steps log skipped, and the release is created
# in draft form for sanity-check.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # gh release create + appcast push

jobs:
  release:
    # Self-hosted runner on the developer's Mac. Two reasons:
    #   1. Toolchain parity — uses the developer's installed Xcode
    #      (currently 26.4.1) so CI-shipped builds render identically
    #      to local dev builds. The earlier macos-14 GitHub-hosted
    #      runner pinned us to Xcode 16.x / SDK 15.2, which compiled
    #      SwiftUI .bordered buttons against an older API path — the
    #      runtime then drew the chunkier, white-fill style on every
    #      shipped release while local dev builds got the newer flat
    #      grey-fill rendering.
    #   2. Queue time — GitHub-hosted macos-26-arm64 runners had 30+
    #      min queue times during peak hours. Self-hosted starts in
    #      seconds.
    # Security: this repo's Actions settings are configured to require
    # approval for fork PRs from all external contributors, so a fork
    # can't push code that auto-executes on the dev's Mac.
    runs-on: [self-hosted, macos-arm64, xcode-26-4-1]
    timeout-minutes: 45  # notarization can take 10+ minutes on a cold Team ID

    env:
      # github.ref_name is "v0.1.0"; downstream steps use $VERSION_NUM
      # for the bare value.
      VERSION_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version number
        run: echo "VERSION_NUM=${VERSION_TAG#v}" >> "$GITHUB_ENV"

      - name: Pick build script for this tag
        # v0.1.x stays on the no-virtual-camera build to keep the
        # existing release line shipping unblocked while v0.2.x is
        # built from feature/virtual-camera. Anything matching v0.2.*
        # or later (including v1.x) gets the virtual-camera build.
        run: |
          set -euo pipefail
          case "$VERSION_TAG" in
              v0.0.0-*|v0.1.*)
                  BUILD_SCRIPT=scripts/make-app.sh
                  ;;
              *)
                  BUILD_SCRIPT=scripts/make-app-with-virtual-camera.sh
                  ;;
          esac
          echo "BUILD_SCRIPT=$BUILD_SCRIPT" >> "$GITHUB_ENV"
          echo "Selected build script: $BUILD_SCRIPT"

      - name: Decode provisioning profile
        # Only required for builds that embed the Camera Extension.
        # Skipped silently for v0.1.x tags (the no-virtual-camera path)
        # so its release pipeline stays a no-op for this step.
        env:
          PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          if [[ "$BUILD_SCRIPT" != "scripts/make-app-with-virtual-camera.sh" ]]; then
              echo "Skipping — v0.1.x build doesn't embed an extension"
              exit 0
          fi
          if [[ -z "${PROFILE_BASE64:-}" ]]; then
              echo "::warning::MACOS_PROVISIONING_PROFILE secret is empty — signed v0.2.x+ build will fail without it"
              exit 0
          fi
          echo -n "$PROFILE_BASE64" | base64 --decode -o Resources/AVPainReliever.provisionprofile
          echo "Wrote Resources/AVPainReliever.provisionprofile ($(stat -f%z Resources/AVPainReliever.provisionprofile) bytes)"

      # No Select Xcode step on self-hosted: the runner uses whichever
      # Xcode is at /Applications/Xcode.app on the dev's Mac (currently
      # 26.4.1). When the dev upgrades local Xcode, CI follows
      # automatically, which is the lockstep behavior we want.

      - name: Reset SPM artifact cache
        # GitHub-hosted runner edge case: a primed
        # ~/Library/Caches/org.swift.swiftpm/artifacts directory (or
        # an aborted prior download) leaves a partial that breaks
        # SPM's binary-target downloader on Sparkle's zip with
        # "already exists in file system" — its move-into-place step
        # isn't overwrite-safe. Skipped on self-hosted because (a) the
        # cache state is owned by the dev across all their Swift work
        # and we don't want CI wiping it on every release, and (b) the
        # original failure mode hasn't been observed locally.
        if: runner.environment == 'github-hosted'
        run: rm -rf ~/Library/Caches/org.swift.swiftpm

      - name: Resolve SPM dependencies
        run: swift package resolve

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${CERT_BASE64:-}" ]]; then
              echo "::warning::MACOS_CERTIFICATE secret is empty — building unsigned (dryrun mode)"
              exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          echo -n "$CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
              -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [[ -z "$IDENTITY" ]]; then
              echo "::error::No Developer ID Application identity found in imported keychain"
              exit 1
          fi
          echo "MAC_CERT_NAME=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build .app
        env:
          VERSION: ${{ env.VERSION_NUM }}
        run: |
          set -euo pipefail
          # MAC_CERT_NAME is set by the keychain step when secrets
          # were available; otherwise unset → script ad-hoc signs.
          # BUILD_SCRIPT was picked by the earlier step based on the
          # tag prefix (v0.1.x → make-app.sh, v0.2.x+ →
          # make-app-with-virtual-camera.sh).
          "$BUILD_SCRIPT"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${MAC_CERT_NAME:-}" ]]; then
              echo "::warning::Skipping notarization — bundle is unsigned"
              exit 0
          fi
          if [[ -z "${APPLE_ID:-}" || -z "${APPLE_ID_PASSWORD:-}" || -z "${APPLE_TEAM_ID:-}" ]]; then
              echo "::error::Apple notary secrets missing while a signed cert was used"
              exit 1
          fi
          xcrun notarytool submit dist/AVPainReliever.app.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
          xcrun stapler staple dist/AVPainReliever.app
          # Re-zip after stapling so the published asset carries the ticket.
          rm -f dist/AVPainReliever.app.zip
          ditto -c -k --sequesterRsrc --keepParent \
              dist/AVPainReliever.app dist/AVPainReliever.app.zip

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Two flows are supported:
          #   1. Curated notes: maintainer pre-creates the release as a
          #      draft with --notes "..." BEFORE pushing the tag. We
          #      detect the existing release and just attach the asset.
          #   2. Auto notes: no prior release exists. We create a draft
          #      with --generate-notes (commit-list fallback). The
          #      maintainer can edit the body in the draft before
          #      publishing; the post-publish workflow will refresh the
          #      appcast description.
          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
              gh release upload "$VERSION_TAG" dist/AVPainReliever.app.zip --clobber
          else
              gh release create "$VERSION_TAG" \
                  dist/AVPainReliever.app.zip \
                  --draft \
                  --generate-notes \
                  --title "$VERSION_TAG"
          fi
          # Mark dev / experimental tags as prerelease so GitHub's
          # `/releases/latest` redirect correctly returns the most
          # recent STABLE release rather than the most recent dev tag.
          # Same tag-pattern decision the appcast workflow uses to
          # pick a Sparkle channel. Idempotent: re-running on the same
          # tag is a no-op.
          case "$VERSION_TAG" in
              *-dev*|*-experimental*)
                  gh release edit "$VERSION_TAG" --prerelease ;;
              *)
                  gh release edit "$VERSION_TAG" --prerelease=false ;;
          esac

      # Appcast publishing happens in a separate workflow
      # (.github/workflows/appcast-publish.yml) triggered by
      # `release: published`. That decouples "binary is built and
      # available" from "users see it via Check for Updates": the
      # maintainer edits the draft release notes (typically into the
      # Vince Vaughn voice) before clicking Publish, and the appcast
      # item gets the published body as its description rather than
      # the auto-generated PR list. Releases become deliberate.
