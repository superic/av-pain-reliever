# Continuous integration: runs `swift test` on every pull request and
# every push to main, so a regression in the engine library or the
# app helper code lands as a red check before it merges (and before
# release.yml ever sees it).
#
# Intentionally narrow: we only run the test suite. The release
# workflow handles signing, notarization, and the rest of the
# distribution pipeline — this file is the cheap, fast feedback loop.

name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Skip on tag pushes — release.yml fires on v*.*.* and runs the
    # full build anyway. Avoid double-running on tag-on-main events.
    tags-ignore: ["**"]

permissions:
  contents: read

jobs:
  test:
    # Self-hosted runner on the developer's Mac. Mirrors release.yml's
    # runner choice so test results reflect the same toolchain that
    # ships builds — otherwise a passing test CI signal can mask a
    # toolchain incompatibility that release.yml would surface only
    # after a tag push. Security: Actions settings require approval
    # for fork PRs from all external contributors, so a fork can't
    # push code that auto-executes on the dev's Mac.
    runs-on: [self-hosted, macos-arm64, xcode-26-4-1]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # No Select Xcode step on self-hosted — the runner uses
      # whichever Xcode is at /Applications/Xcode.app on the dev's
      # Mac (currently 26.4.1). When local Xcode bumps, CI follows.

      - name: Cache SPM artifacts
        # Skipped on self-hosted because (a) the runner has natural
        # disk persistence — `.build` and `~/Library/Caches/org.swift.swiftpm`
        # survive between jobs without remote-cache help, and (b) the
        # cache key only includes `runner.os`, which is "macOS" for
        # both github-hosted and self-hosted macOS runners. Restoring
        # a cache built by an earlier github-hosted run onto the
        # self-hosted Mac poisons `.build` with paths embedded under
        # `/Users/runner/work/...` (the github-hosted workspace),
        # causing SPM's binary-target downloader to fail looking for
        # Sparkle's XCFramework Info.plist at a path that doesn't
        # exist on the self-hosted Mac. Burned us once on 2026-05-06;
        # the conditional gate prevents a second incident.
        if: runner.environment == 'github-hosted'
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test --parallel

      - name: Appcast upsert regression
        # Tiny shell-test harness for scripts/upsert-appcast-item.awk.
        # Pins the start-of-line anchoring that prevents the awk
        # script from eating XML comments whose prose mentions
        # `<item>`. Without this, a future workflow tweak could
        # re-introduce the 2026-05-10 live-feed-broke bug.
        run: scripts/test-upsert-appcast.sh
